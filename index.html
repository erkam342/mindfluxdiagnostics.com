<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindFlux Diagnostics | Remote EEG Interpretation</title>
  <meta name="description" content="MindFlux Diagnostics provides remote EEG interpretation by epilepsy board-certified epileptologists from top U.S. institutions, covering neonatal, pediatric, adult, and intracranial EEG studies.">
  <style>
    :root {
      --navy: #123555;
      --navy-dark: #0b2236;
      --bg: #f3f4f6;
      --text: #111827;
      --muted: #4b5563;
      --accent: #0f766e;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    header {
      background: white;
      border-bottom: 1px solid #e5e7eb;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 1.1rem 1.25rem;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .logo-wrap img {
      max-height: 52px;
      height: auto;
      width: auto;
      display: block;
    }

    .logo-text-small {
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .nav-links {
      display: flex;
      gap: 1rem;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .nav-links a:hover {
      color: var(--navy);
    }

    .btn-header {
      padding: 0.45rem 0.9rem;
      border-radius: 999px;
      border: 1px solid var(--navy);
      color: white;
      background: var(--navy);
      font-size: 0.8rem;
    }

    main {
      padding-bottom: 3rem;
    }

    .hero {
      background: white;
      border-bottom: 1px solid #e5e7eb;
    }

    .hero-inner {
      max-width: 980px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 2.75rem;
      display: grid;
      grid-template-columns: minmax(0, 3fr) minmax(0, 2.4fr);
      gap: 2rem;
      align-items: center;
    }

    .hero-kicker {
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--navy);
      margin-bottom: 0.5rem;
    }

    .hero-title {
      font-size: clamp(2rem, 4vw, 2.6rem);
      line-height: 1.2;
      margin-bottom: 0.8rem;
      color: var(--navy-dark);
    }

    .hero-title span {
      color: var(--accent);
    }

    .hero-subtitle {
      color: var(--muted);
      font-size: 0.98rem;
      max-width: 32rem;
      margin-bottom: 1.3rem;
    }

    .hero-badge {
      background: #ecfdf3;
      border-radius: 999px;
      padding: 0.35rem 0.8rem;
      font-size: 0.8rem;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: #166534;
      margin-bottom: 0.8rem;
    }

    .hero-badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #22c55e;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 0.5rem;
      margin-bottom: 1.1rem;
    }

    .btn-primary {
      background: var(--navy);
      color: white;
      padding: 0.7rem 1.4rem;
      border-radius: 999px;
      font-size: 0.95rem;
      border: none;
      cursor: pointer;
    }

    .btn-secondary {
      border-radius: 999px;
      border: 1px solid #d1d5db;
      padding: 0.65rem 1.2rem;
      font-size: 0.9rem;
      color: var(--muted);
      background: white;
      cursor: pointer;
    }

    .pill-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .pill {
      padding: 0.25rem 0.7rem;
      border-radius: 999px;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
    }

    .hero-card {
      padding: 1.4rem 1.3rem;
      background: #eff6ff;
      border-radius: 1rem;
      border: 1px solid #bfdbfe;
      font-size: 0.88rem;
      color: #1e3a8a;
    }

    .hero-card h3 {
      font-size: 1rem;
      margin-bottom: 0.5rem;
    }

    .hero-card ul {
      margin-left: 1.1rem;
      margin-top: 0.4rem;
    }

    section {
      max-width: 980px;
      margin: 0 auto;
      padding: 2.3rem 1.25rem 0;
    }

    h2 {
      font-size: 1.5rem;
      color: var(--navy-dark);
      margin-bottom: 0.4rem;
    }

    .section-text {
      color: var(--muted);
      font-size: 0.96rem;
      max-width: 44rem;
      margin-bottom: 1.1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1rem;
    }

    .card {
      background: white;
      border-radius: 0.9rem;
      border: 1px solid #e5e7eb;
      padding: 1rem 1.1rem 1.2rem;
      font-size: 0.9rem;
    }

    .card h3 {
      font-size: 1rem;
      margin-bottom: 0.35rem;
      color: var(--navy-dark);
    }

    .card p {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .card ul {
      margin-left: 1.1rem;
      margin-top: 0.3rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .contact-block {
      background: white;
      border-radius: 0.9rem;
      border: 1px solid #e5e7eb;
      padding: 1.1rem 1.2rem 1.3rem;
      font-size: 0.9rem;
      margin-top: 0.8rem;
    }

    footer {
      margin-top: 2.5rem;
      padding: 1.5rem 1.25rem 2rem;
      border-top: 1px solid #e5e7eb;
      text-align: center;
      font-size: 0.8rem;
      color: #6b7280;
      background: white;
    }

    @media (max-width: 800px) {
      .hero-inner {
        grid-template-columns: minmax(0, 1fr);
      }
    }

    @media (max-width: 720px) {
      .nav-links {
        display: none;
      }

      .header-inner {
        justify-content: space-between;
      }

      .hero-inner {
        padding-top: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="header-inner">
        <div class="logo-wrap">
          <!-- Make sure this filename matches the logo you uploaded -->
          <img src="logo-mindflux.png" alt="MindFlux Diagnostics logo">
          <div>
            <div class="logo-text-small">Remote EEG Interpretation</div>
          </div>
        </div>
        <div class="nav-links">
          <a href="#services">Services</a>
          <a href="#expertise">Clinical expertise</a>
          <a href="#contact">Contact</a>
          <a class="btn-header" href="mailto:contact@mindfluxdiagnostics.com?subject=Remote%20EEG%20Coverage%20Inquiry">
            Request coverage
          </a>
        </div>
      </div>
    </div>
  </header>

  <main>
    <!-- HERO -->
    <section class="hero">
      <div class="hero-inner">
        <div>
          <div class="hero-kicker">Epilepsy subspecialty EEG interpretation</div>
          <h1 class="hero-title">
            Remote EEG reading by
            <span>epilepsy board-certified epileptologists.</span>
          </h1>

          <div class="hero-badge">
            <span class="hero-badge-dot"></span>
